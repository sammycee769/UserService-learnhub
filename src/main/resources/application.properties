spring.application.name=user-service
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
server.port=8083
spring.kafka.bootstrap-servers=localhost:9092
spring.mongodb.uri=mongodb://localhost:27018/learnhub
spring.kafka.consumer.group-id=user-service
spring.kafka.consumer.auto-offset-reset=earliest
# user-service application.properties
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.type.mapping=userRegistered:com.sammy.userservice.kafka.events.UserRegisteredEvent
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer


# Topics
kafka.topics.user-registered=user-registered
kafka.topics.user-updated=user-updated
kafka.topics.user-deactivated=user-deactivated
kafka.topics.user-activated=user-activated
kafka.topics.user-deleted=user-deleted

spring.web.error.include-message=always
logging.level.org.springframework.web=DEBUG
spring.web.error.include-binding-errors=always